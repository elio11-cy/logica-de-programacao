<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Média</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 520px;
            margin: 40px auto;
            padding: 0 16px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            margin-bottom: 24px;
        }
        label {
            display: block;
            margin-top: 12px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            padding: 12px 18px;
            width: 100%;
            font-size: 16px;
            cursor: pointer;
        }
        .resultado {
            margin-top: 24px;
            padding: 16px;
            border: 1px solid #ccc;
            background: #f9f9f9;
            border-radius: 8px;
        }
        .aprovado {
            color: #1a7f1a;
            font-weight: bold;
        }
        .reprovado {
            color: #c22;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Verifique sua média</h1>

    <form id="mediaForm">
        <label for="nome">Nome do aluno</label>
        <input type="text" id="nome" placeholder="Digite o nome" required />

        <label for="nota1">Nota 1</label>
        <input type="number" id="nota1" min="0" max="10" step="0.1" placeholder="0.0" required />

        <label for="nota2">Nota 2</label>
        <input type="number" id="nota2" min="0" max="10" step="0.1" placeholder="0.0" required />

        <label for="nota3">Nota 3</label>
        <input type="number" id="nota3" min="0" max="10" step="0.1" placeholder="0.0" required />

        <label for="nota4">Nota 4</label>
        <input type="number" id="nota4" min="0" max="10" step="0.1" placeholder="0.0" required />

        <button type="submit">Calcular média</button>
    </form>

    <div id="resultado" class="resultado" hidden></div>

    <script>
        document.getElementById('mediaForm').addEventListener('submit', function (event) {
            event.preventDefault();

            const nome = document.getElementById('nome').value.trim();
            const nota1 = parseFloat(document.getElementById('nota1').value);
            const nota2 = parseFloat(document.getElementById('nota2').value);
            const nota3 = parseFloat(document.getElementById('nota3').value);
            const nota4 = parseFloat(document.getElementById('nota4').value);

            if (!nome) {
                alert('Digite o nome do aluno.');
                return;
            }

            const notas = [nota1, nota2, nota3, nota4];
            const notasValidas = notas.every(nota => !Number.isNaN(nota) && nota >= 0 && nota <= 10);

            if (!notasValidas) {
                alert('Digite todas as notas entre 0 e 10.');
                return;
            }

            const soma = notas.reduce((acum, valor) => acum + valor, 0);
            const media = soma / notas.length;
            const aprovado = media >= 6;

            const resultado = document.getElementById('resultado');
            resultado.hidden = false;
            resultado.innerHTML = `
                <p><strong>Aluno:</strong> ${nome}</p>
                <p><strong>Média:</strong> ${media.toFixed(2)}</p>
                <p class="${aprovado ? 'aprovado' : 'reprovado'}">
                    ${aprovado ? 'Aprovado' : 'Reprovado'}
                </p>
            `;
        });
    </script>
</body>
</html>
